spring:
  application:
    name: signal-server

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true   # data.sql이 Hibernate 스키마 생성/검증 이후에 실행되도록 함

  sql:
    init:
      mode: always   # MySQL 등 임베디드가 아닌 DB에서도 data.sql 시드가 실행되도록 함

  servlet:
    multipart:
      max-file-size: 100MB      # 딥페이크 탐지의 영상 업로드를 지원하기 위해 상향 (이미지 전용 API는 서비스 레벨에서 10MB로 별도 제한)
      max-request-size: 110MB

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}   # Gmail 주소
    password: ${SMTP_PASS:}   # Gmail 앱 비밀번호 (2단계 인증 → 앱 비밀번호 발급)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000

verification:
  code-expiration: 300000    # 인증번호 유효시간 5분 (ms)
  token-expiration: 600000   # 인증 토큰 유효시간 10분 (ms)

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 3600000      # 1시간 (ms)
  refresh-token-expiration: 1209600000  # 14일 (ms)

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}   # 로컬 저장 경로 (추후 S3 교체 가능)
  base-url: ${FILE_BASE_URL:/uploads}      # 파일 접근 URL prefix

protection:
  processing-delay-ms: 3000   # 이미지 보호 처리 시뮬레이션 지연 (스텁, 추후 AI 서버 연동 시 제거)

monitoring:
  processing-delay-ms: 3000   # 얼굴 모니터링 초기 탐지 시뮬레이션 지연 (스텁, 추후 AI 서버 연동 시 제거)

deepfake-detection:
  processing-delay-ms: 3000   # 딥페이크 탐지 시뮬레이션 지연 (스텁, 추후 AI 서버 연동 시 제거)

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/signal?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
